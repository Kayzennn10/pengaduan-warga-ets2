<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Admin</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <nav class="navbar">
        <div class="brand"><i class="fas fa-shield-alt"></i> Portal Desa</div>
        <div class="nav-links">
            <a href="/">Beranda</a>
            <a href="/pengaduan">Buat Laporan</a>
        </div>
    </nav>

    <div class="container">
        <h2><i class="fas fa-database"></i> Database Laporan Masuk</h2>
        <table>
            <thead>
                <tr>
                    <th><i class="fas fa-hashtag"></i> ID</th>
                    <th><i class="fas fa-user"></i> Nama Pelapor</th>
                    <th><i class="fas fa-align-left"></i> Keluhan</th>
                    <th><i class="fas fa-image"></i> Bukti S3</th>
                    <th><i class="fas fa-info-circle"></i> Status</th>
                </tr>
            </thead>
            <tbody>
                {% for item in laporan %}
                <tr>
                    <td>#{{ item.id }}</td>
                    <td><strong>{{ item.nama }}</strong></td>
                    <td>{{ item.keluhan }}</td>
                    <td><i class="fas fa-file-image"></i> {{ item.foto }}</td>
                    <td><span class="badge status-menunggu"><i class="fas fa-clock"></i> {{ item.status }}</span></td>
                </tr>
                {% else %}
                <tr>
                    <td colspan="5" style="text-align:center; color:#777;"><i class="fas fa-folder-open"></i> Belum ada data laporan dari warga.</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
        <br>
    </div>
</body>
</html>
